name: Build Android App (Kakeibo Journal)

# Builds the Kakeibo Journal Android app.
# - Always produces a debug APK you can install directly on a phone for testing.
# - Produces a Play-ready signed AAB + release APK when signing secrets are set.
#
# Run it: GitHub → Actions → "Build Android App (Kakeibo Journal)" → Run workflow.
# Signing secrets (Settings → Secrets and variables → Actions):
#   KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD   (see kakeibo-journal/ANDROID.md)

on:
  workflow_dispatch:
    inputs:
      versionName:
        description: "versionName override, e.g. 1.0.1 (optional)"
        required: false
        default: ""
      versionCode:
        description: "versionCode override (integer), e.g. 2 (optional)"
        required: false
        default: ""
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  android:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
    defaults:
      run:
        working-directory: kakeibo-journal
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: kakeibo-journal/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: yes | sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0" >/dev/null

      - name: Install dependencies
        run: npm ci

      - name: Apply version overrides
        if: github.event.inputs.versionName != '' || github.event.inputs.versionCode != ''
        run: |
          if [ -n "${{ github.event.inputs.versionName }}" ]; then
            sed -i "s/versionName \".*\"/versionName \"${{ github.event.inputs.versionName }}\"/" android/app/build.gradle
          fi
          if [ -n "${{ github.event.inputs.versionCode }}" ]; then
            sed -i "s/versionCode [0-9]\+/versionCode ${{ github.event.inputs.versionCode }}/" android/app/build.gradle
          fi

      - name: Build web assets
        run: npm run build

      - name: Capacitor sync
        run: npx cap sync android

      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Build debug APK
        working-directory: kakeibo-journal/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build signed release (AAB + APK)
        if: env.KEYSTORE_BASE64 != ''
        working-directory: kakeibo-journal/android
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
        run: ./gradlew bundleRelease assembleRelease --no-daemon --stacktrace

      - name: Upload debug APK (installable for testing)
        uses: actions/upload-artifact@v4
        with:
          name: kakeibo-debug-apk
          path: kakeibo-journal/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload release AAB (upload this to Google Play)
        if: env.KEYSTORE_BASE64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: kakeibo-release-aab
          path: kakeibo-journal/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Upload release APK
        if: env.KEYSTORE_BASE64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: kakeibo-release-apk
          path: kakeibo-journal/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
