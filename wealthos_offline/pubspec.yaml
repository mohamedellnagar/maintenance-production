name: wealthos_offline
description: WealthOS Offline — تطبيق إدارة الحياة المالية الشخصية يعمل دون اتصال بالكامل.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Local database
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3

  # Security
  flutter_secure_storage: ^9.2.2
  encrypt: ^5.0.3
  crypto: ^3.0.3
  local_auth: ^2.2.0

  # Charts
  fl_chart: ^0.68.0

  # Reports (PDF)
  pdf: ^3.11.0
  printing: ^5.13.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  share_plus: ^9.0.0
  file_picker: ^8.0.5

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
